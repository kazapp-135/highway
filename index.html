<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAZ-HIGHWAY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&display=swap');
        :root { --bg-color: #080a08; --panel-bg: #121612; --nexco-green: #00A34F; --nexco-light: #1dd372; --nexco-dark: #006b33; --nexco-muted: #0d2918; --text-main: #E8EFE8; --text-sub: #7A857A; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Orbitron', sans-serif; margin: 0; padding-bottom: 80px; }
        header { background: linear-gradient(135deg, var(--nexco-dark), var(--nexco-green)); text-align: center; padding: 16px 0; font-size: 20px; font-weight: 900; letter-spacing: 3px; }
        .container { padding: 16px; max-width: 600px; margin: 0 auto; }
        .mode-switch { display: flex; gap: 8px; margin-bottom: 24px; }
        .mode-btn { flex: 1; padding: 14px; background: var(--panel-bg); color: var(--text-sub); border: 1px solid #2a332a; border-radius: 8px; font-size: 14px; font-weight: bold; }
        .mode-btn.active { background: var(--nexco-muted); color: var(--nexco-light); border-color: var(--nexco-green); }
        #gps-btn { width: 100%; padding: 20px; background: linear-gradient(180deg, var(--nexco-light), var(--nexco-green)); color: #002210; font-size: 18px; font-weight: 900; border: none; border-radius: 12px; margin-bottom: 20px; }
        .sapa-card { background: var(--panel-bg); padding: 16px; border-radius: 10px; margin-bottom: 16px; border: 1px solid #1f261f; }
        .sapa-name { font-size: 20px; font-weight: bold; }
        #status-display { text-align: center; color: var(--nexco-light); margin-bottom: 20px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <header>KAZ-HIGHWAY</header>
    <div class="container">
        <div class="mode-switch">
            <button class="mode-btn active" id="mode-drive" onclick="switchMode('drive')">助手席モード</button>
            <button class="mode-btn" id="mode-db" onclick="switchMode('db')">路線図検索</button>
        </div>
        <div id="drive-view">
            <button id="gps-btn" onclick="startLocalAnalysis()">SCANNING LIVE</button>
            <div id="status-display">LOADED: DATABASE READY.</div>
            <div id="timeline-container"></div>
        </div>
        <div id="db-view" style="display: none;">
            <select id="route-select" onchange="renderSelectedRoute()" style="width:100%; padding:10px; background:#121612; color:#fff;"><option value="">▼ 路線図を選択</option></select>
            <div id="db-timeline-container" style="margin-top:20px;"></div>
        </div>
    </div>

<script>
    let joints = [];
    let facilities = [];

    // 起動時にデータを読み込む
    window.onload = async () => {
        try {
            const jRes = await fetch('./data/highway_joints.csv');
            const jText = await jRes.text();
            joints = Papa.parse(jText, {header:true, skipEmptyLines:true}).data;

            const fRes = await fetch('./data/highway_facilities_db.csv');
            const fText = await fRes.text();
            facilities = Papa.parse(fText, {header:true, skipEmptyLines:true}).data;

            populateRouteSelect();
        } catch (e) { document.getElementById('status-display').innerText = "DB LOAD ERROR"; }
    };

    // ローカルで計算して路線を特定
    function startLocalAnalysis() {
        navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            let nearest = null;
            let minDist = 9999;
            
            joints.forEach(j => {
                const dist = Math.hypot(parseFloat(j.lat) - lat, parseFloat(j.lon) - lon);
                if(dist < minDist) { minDist = dist; nearest = j; }
            });

            if(nearest && minDist < 0.05) { // 0.05度は約5km圏内
                document.getElementById('status-display').innerText = `LOCKED: ${nearest.highway}`;
                renderTimeline(nearest.highway, "timeline-container");
            } else {
                document.getElementById('status-display').innerText = "高速道路外です";
            }
        });
    }

    function renderTimeline(routeName, containerId) {
        const container = document.getElementById(containerId);
        container.innerHTML = "";
        const routeFacilities = facilities.filter(f => f.highway === routeName);
        routeFacilities.forEach(f => {
            container.innerHTML += `<div class="sapa-card"><div class="sapa-name">${f.name}</div></div>`;
        });
    }

    function populateRouteSelect() {
        const select = document.getElementById('route-select');
        [...new Set(facilities.map(f => f.highway))].filter(Boolean).forEach(r => {
            select.innerHTML += `<option value="${r}">${r}</option>`;
        });
    }

    function renderSelectedRoute() {
        renderTimeline(document.getElementById('route-select').value, "db-timeline-container");
    }

    function switchMode(mode) {
        document.getElementById('drive-view').style.display = mode === 'drive' ? 'block' : 'none';
        document.getElementById('db-view').style.display = mode === 'db' ? 'block' : 'none';
    }
</script>
</body>
</html>
