<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAZ-HIGHWAY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+JP:wght@400;700&family=Orbitron:wght@500;800;900&display=swap');
        :root {
            --bg-color: #080a08; --panel-bg: #121612; --nexco-green: #00A34F; --nexco-light: #1dd372;
            --nexco-dark: #006b33; --nexco-muted: #0d2918; --text-main: #E8EFE8; --text-sub: #7A857A;
            --alert-red: #E63946; --dev-red: #ff3333;
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Orbitron', 'IBM Plex Sans JP', sans-serif; margin: 0; padding-bottom: 80px; }
        header { background: linear-gradient(135deg, var(--nexco-dark), var(--nexco-green)); text-align: center; padding: 16px 0; font-size: 20px; font-weight: 900; letter-spacing: 3px; cursor: pointer; }
        .container { padding: 16px; max-width: 600px; margin: 0 auto; }
        .mode-switch { display: flex; gap: 8px; margin-bottom: 24px; }
        .mode-btn { flex: 1; padding: 14px; background: var(--panel-bg); color: var(--text-sub); border: 1px solid #2a332a; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .mode-btn.active { background: var(--nexco-muted); color: var(--nexco-light); border-color: var(--nexco-green); }
        #gps-btn { width: 100%; padding: 20px; background: linear-gradient(180deg, var(--nexco-light), var(--nexco-green)); color: #002210; font-size: 18px; font-weight: 900; border: none; border-radius: 12px; margin-bottom: 20px; cursor: pointer; }
        .timeline { border-left: 3px solid var(--nexco-dark); margin-left: 16px; padding-left: 24px; padding-top: 10px; }
        .sapa-card { background: var(--panel-bg); padding: 16px; border-radius: 10px; margin-bottom: 16px; border: 1px solid #1f261f; }
        #status-display { text-align: center; color: var(--nexco-light); margin-bottom: 20px; font-size: 14px; font-weight: bold; }
        #test-panel { display: none; background: #2a0000; border: 1px solid var(--dev-red); border-radius: 8px; padding: 12px; margin-bottom: 20px; }
        .test-input { width: 45%; padding: 8px; background: #000; color: #fff; border: 1px solid #660000; }
    </style>
</head>
<body>

    <header id="app-header">KAZ-HIGHWAY</header>
    <div class="container">
        <div id="test-panel">
            <div style="color:var(--dev-red);">[DEBUG MODE]</div>
            <input type="number" id="test-lat" class="test-input" value="35.4552">
            <input type="number" id="test-lon" class="test-input" value="139.3939">
        </div>
        <div class="mode-switch">
            <button class="mode-btn active" id="mode-drive" onclick="switchMode('drive')">助手席モード</button>
            <button class="mode-btn" id="mode-db" onclick="switchMode('db')">路線図検索</button>
        </div>
        <div id="drive-view">
            <button id="gps-btn" onclick="startGPSAnalysis()">SCANNING LIVE ROUTE</button>
            <div id="status-display">GPS STANDBY.</div>
            <div class="timeline" id="timeline-container"></div>
        </div>
        <div id="db-view" style="display: none;">
            <select id="route-select" onchange="renderSelectedRoute()"><option value="">▼ 路線図を選択</option></select>
            <div class="timeline" id="db-timeline-container"></div>
        </div>
    </div>

<script>
const JOINTS_URL = "./data/highway_joints.csv";
const DB_URL = "./data/highway_facilities_db.csv";
let facilitiesDB = [];
let clickCount = 0;
let isTestMode = false;

window.onload = async () => {
    try {
        const facRes = await fetch(`${API_BASE_URL}/api/facilities`);
        const facText = await facRes.text();
        Papa.parse(facText, { header: true, skipEmptyLines: true, complete: (res) => { facilitiesDB = res.data; console.log("DB Loaded:", facilitiesDB.length, "items"); } });
        populateRouteSelect();
    } catch (e) { console.error(e); }
};

document.getElementById('app-header').addEventListener('click', () => {
    clickCount++;
    if (clickCount >= 5) {
        document.getElementById('test-panel').style.display = 'block';
        isTestMode = true;
        document.getElementById('status-display').innerText = "DEV MODE ON";
    }
});

async function startGPSAnalysis() {
    document.getElementById('timeline-container').innerHTML = "";
    let coords = [{lat: document.getElementById('test-lat').value, lon: document.getElementById('test-lon').value}];
    
    document.getElementById('status-display').innerText = "SENDING...";

    try {
        const res = await fetch(`${API_BASE_URL}/api/analyze_route`, {
            method: "POST", headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ coords: coords })
        });
        const result = await res.json();
        
        // 💡 ここで結果をコンソールに出して確認！
        console.log("Server Response:", result);
        
        if (result.status === "success") {
            document.getElementById('status-display').innerText = `LOCKED: ${result.route}`;
            renderTimeline(result.route, "timeline-container");
        } else {
            document.getElementById('status-display').innerText = result.message;
        }
    } catch (e) {
        document.getElementById('status-display').innerText = "CONN ERROR";
    }
}

function renderTimeline(routeName, containerId) {
    const container = document.getElementById(containerId);
    // 💡 ここでフィルタリング結果をチェック
    const routeFacilities = facilitiesDB.filter(f => f.highway === routeName);
    console.log("Filtering by:", routeName, "Found:", routeFacilities.length);
    
    if (routeFacilities.length === 0) {
        container.innerHTML = `<div style="color:red">ERROR: 路線データが見つかりません (${routeName})</div>`;
        return;
    }

    routeFacilities.forEach(f => {
        container.innerHTML += `<div class="sapa-card"><div class="sapa-name">${f.name}</div></div>`;
    });
}

function renderSelectedRoute() {
    const route = document.getElementById('route-select').value;
    if(route) renderTimeline(route, "db-timeline-container");
}

function populateRouteSelect() {
    const select = document.getElementById('route-select');
    [...new Set(facilitiesDB.map(f => f.highway))].filter(Boolean).forEach(r => {
        select.innerHTML += `<option value="${r}">${r}</option>`;
    });
}
function switchMode(mode) {
    document.getElementById('drive-view').style.display = mode === 'drive' ? 'block' : 'none';
    document.getElementById('db-view').style.display = mode === 'db' ? 'block' : 'none';
}
</script>
</body>
</html>
