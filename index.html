<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAZ-HIGHWAY-OFFLINE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { background: #080a08; color: #E8EFE8; font-family: sans-serif; padding: 20px; }
        .sapa-card { background: #121612; padding: 15px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #1f261f; }
        #log { color: #ff3333; font-size: 12px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>高速道路検索 (GitHub版)</h1>
    <button onclick="startAnalysis()" style="padding:15px; font-size:18px;">現在地から検索</button>
    <div id="log"></div>
    <div id="result"></div>

    <script>
        let joints = [];
        let facilities = [];

        // ページ読み込み時にデータをダウンロード
        window.onload = async () => {
            const log = document.getElementById('log');
            try {
                // ファイルパスを正しく指定 (リポジトリのルートから見て data/...)
                const jointsRes = await fetch('./data/highway_joints.csv');
                const jointsText = await jointsRes.text();
                joints = Papa.parse(jointsText, {header:true, skipEmptyLines:true}).data;

                const facRes = await fetch('./data/highway_facilities_db.csv');
                const facText = await facRes.text();
                facilities = Papa.parse(facText, {header:true, skipEmptyLines:true}).data;

                log.innerText = "DB読み込み完了！準備OK";
            } catch (e) {
                log.innerText = "読み込みエラー: " + e.message;
            }
        };

        function startAnalysis() {
            navigator.geolocation.getCurrentPosition(pos => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                
                // 最も近いジョイントを探す
                let nearest = null;
                let minDist = 9999;
                
                joints.forEach(j => {
                    const dist = Math.hypot(parseFloat(j.lat) - lat, parseFloat(j.lon) - lon);
                    if(dist < minDist) { minDist = dist; nearest = j; }
                });

                if(nearest) {
                    document.getElementById('result').innerHTML = `<h3>現在地: ${nearest.highway}</h3>`;
                    renderFacilities(nearest.highway);
                }
            }, err => { alert("位置情報が取得できません"); });
        }

        function renderFacilities(hName) {
            const list = facilities.filter(f => f.highway === hName);
            const container = document.getElementById('result');
            list.forEach(f => {
                container.innerHTML += `<div class="sapa-card">${f.name}</div>`;
            });
        }
    </script>
</body>
</html>
