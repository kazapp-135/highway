<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KAZ-HIGHWAY-COMPLETE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;800;900&display=swap');
        :root { --bg-color: #080a08; --panel-bg: #121612; --nexco-green: #00A34F; --nexco-light: #1dd372; --nexco-dark: #006b33; --text-main: #E8EFE8; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Orbitron', sans-serif; margin: 0; padding-bottom: 50px; }
        header { background: linear-gradient(135deg, var(--nexco-dark), var(--nexco-green)); text-align: center; padding: 20px; font-weight: 900; letter-spacing: 3px; }
        .container { padding: 16px; max-width: 600px; margin: 0 auto; }
        .sapa-card { background: var(--panel-bg); padding: 15px; border-radius: 10px; margin-bottom: 12px; border: 1px solid #1f261f; display: flex; justify-content: space-between; align-items: center; }
        .sapa-name { font-size: 16px; font-weight: bold; }
        .icons { font-size: 16px; letter-spacing: 2px; }
        #status-display { color: var(--nexco-light); font-size: 12px; margin-bottom: 10px; text-align: center; }
        #gps-btn { width: 100%; padding: 15px; background: var(--nexco-green); color: #fff; font-weight: bold; border: none; border-radius: 8px; }
    </style>
</head>
<body>
    <header>KAZ-HIGHWAY</header>
    <div class="container">
        <button id="gps-btn" onclick="analyze()">現在地をスキャン</button>
        <div id="status-display">DB LOADING...</div>
        <div id="timeline"></div>
    </div>

<script>
    let joints = [];
    let facilities = [];

    // 読み込み
    window.onload = async () => {
        try {
            const jRes = await fetch('./data/highway_joints.csv');
            joints = Papa.parse(await jRes.text(), {header:true, skipEmptyLines:true}).data;
            const fRes = await fetch('./data/highway_facilities_db.csv');
            facilities = Papa.parse(await fText = await fRes.text(), {header:true, skipEmptyLines:true}).data;
            document.getElementById('status-display').innerText = "DB READY.";
        } catch(e) { document.getElementById('status-display').innerText = "LOAD ERROR: " + e; }
    };

    function analyze() {
        navigator.geolocation.getCurrentPosition(pos => {
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            
            // 最近傍検索
            let nearest = null;
            let minDist = 9999;
            joints.forEach(j => {
                const dist = Math.hypot(parseFloat(j.lat) - lat, parseFloat(j.lon) - lon);
                if(dist < minDist) { minDist = dist; nearest = j; }
            });

            if(nearest && minDist < 0.1) {
                const route = nearest.highway.trim();
                document.getElementById('status-display').innerText = `LOCKED: ${route}`;
                render(route);
            } else {
                document.getElementById('status-display').innerText = "高速道路外です";
            }
        });
    }

    function render(route) {
        const timeline = document.getElementById('timeline');
        timeline.innerHTML = "";
        
        // 路線名が部分一致するものを抽出
        const matches = facilities.filter(f => f.highway.trim() === route);
        
        if(matches.length === 0) {
            timeline.innerHTML = `<div style="color:red">路線名 "${route}" のデータなし。CSVの表記を確認して。</div>`;
            return;
        }

        matches.forEach(f => {
            // アイコン生成ロジックを完全再現
            let icons = "";
            if(f.gas_24h == "1") icons += "⛽";
            if(f.conveni == "1") icons += "🏪";
            if(f.restaurant == "1") icons += "🍽️";
            
            timeline.innerHTML += `
                <div class="sapa-card">
                    <div class="sapa-name">${f.name}</div>
                    <div class="icons">${icons}</div>
                </div>`;
        });
    }
</script>
</body>
</html>
