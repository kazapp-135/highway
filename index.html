<style>
    /* タイムラインの親要素：左側の縦線 */
    .timeline-wrapper {
        border-left: 3px solid var(--nexco-green);
        margin-left: 15px;
        padding-left: 20px;
        margin-top: 20px;
    }
    
    /* 各カードのスタイル */
    .sapa-card { 
        background: var(--panel-bg); 
        padding: 16px; 
        border-radius: 10px; 
        margin-bottom: 20px; 
        border: 1px solid #1f261f; 
        position: relative;
    }
    
    /* 縦線上の「丸ポチ」装飾 */
    .sapa-card::before {
        content: '';
        position: absolute;
        left: -29px;
        top: 50%;
        transform: translateY(-50%);
        width: 14px;
        height: 14px;
        background-color: var(--nexco-light);
        border-radius: 50%;
        box-shadow: 0 0 10px var(--nexco-light);
    }
    
    .card-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 8px;}
    .sapa-name { font-size: 18px; font-weight: bold; }
    .distance-badge { color: var(--nexco-light); font-size: 14px; font-weight: bold; }
    .icons { font-size: 16px; color: #888; }
</style>

<script>
    // タイムライン表示用のレンダリング関数
    function renderLiveTimeline(route, currentLat, currentLon) {
        const container = document.getElementById('timeline-container');
        container.innerHTML = ""; // 一旦クリア
        
        // 路線でフィルタリング
        const matches = facilities.filter(f => f.highway && f.highway.trim() === route);
        
        // 縦線を入れるためのラッパー
        const wrapper = document.createElement('div');
        wrapper.className = 'timeline-wrapper';

        matches.forEach(f => {
            const fLat = parseFloat(f.lat);
            const fLon = parseFloat(f.lon);
            // 簡易距離計算
            const dist = Math.sqrt((fLat - currentLat)**2 + (fLon - currentLon)**2) * 111.0;
            
            let icons = "";
            if(f.gas_24h == "1" || f.gas_24h == "true") icons += "⛽ ";
            if(f.conveni == "1" || f.conveni == "true") icons += "🏪 ";
            if(f.restaurant == "1" || f.restaurant == "true") icons += "🍽️ ";
            
            // カードのHTML
            const card = document.createElement('div');
            card.className = 'sapa-card';
            card.innerHTML = `
                <div>
                    <div class="card-header">
                        <div class="sapa-name">${f.name}</div>
                        <div class="distance-badge">あと ${dist.toFixed(1)} km</div>
                    </div>
                    <div class="icons">${icons}</div>
                </div>
            `;
            wrapper.appendChild(card);
        });
        
        container.appendChild(wrapper);
    }
</script>
